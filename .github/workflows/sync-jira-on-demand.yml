name: Sync Jira to Repository (On Demand)

on:
  workflow_dispatch:
    inputs:
      sprint_id:
        description: 'Sprint ID to sync (leave empty for active sprint)'
        required: false
        type: string

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Sync Jira data to Repository
        env:
          JIRA_URL: ${{ secrets.JIRA_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
          JIRA_BOARD_ID: ${{ secrets.JIRA_BOARD_ID }}
          DATA_REPO_OWNER: ${{ secrets.DATA_REPO_OWNER }}
          DATA_REPO_NAME: ${{ secrets.DATA_REPO_NAME }}
          DATA_REPO_TOKEN: ${{ secrets.DATA_REPO_TOKEN }}
        run: |
          if [ -n "${{ inputs.sprint_id }}" ]; then
            python scripts/sync_jira_to_repo.py --sprint-id ${{ inputs.sprint_id }}
          else
            python scripts/sync_jira_to_repo.py
          fi

      - name: Sync completed
        run: echo "Jira data synced to repository successfully"
